<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link rel="stylesheet" href="css/profile.css">
</head>
<body class="profile-page">



    <header class="profile">

      <div class="profile-header"> 
        <div id="pic-header">
          <img id="profile-pic" src="media/profile-picture.png">
          <span id="username-header"></span>
        </div>
      </div>
   
    
      <div class="profile-info">

        <img src="media/profile-picture.png" class="default-pic">
        <h2 id="username"></h2>

        <div id="stats-header">
        <div class="stat">
          <span id="profile-posts">0</span>
          <p>Posts</p>
        </div>

        <div class="stat">
          <span id="profile-followers">0</span>
          <p>Followers</p>
        </div>

        <div class="stat">
          <span id="profile-following">0</span>
          <p>Following</p>
        </div>
      </div>


        <p id="bio">This is the user bio. A short description about the user goes here.</p>
        
        <button id="edit">Edit Profile</button>

        <button id="follow-button">Follow</button>

      </div>


    </header>

    <div id="edit-window">

        <div class="window-content">
          <h3>Edit Profile</h3>

          <input type="text" id="editFullname" placeholder="Full Name">
          <input type="text" id="editUsername" placeholder="Username">
          <input type="email" id="editEmail" placeholder="Email">
          <input type="text" id="editPhone" placeholder="Phone">
          <textarea id="editBio" placeholder="Bio"></textarea>

          <div class="window-buttons">
            <button id="save">Save</button>
            <button id="cancel">Cancel</button>

    </div>
  </div>
</div>
     

    <div id="my-posts-heading"></div>
    
    <section>
      <div id="my-posts"></div>
    </section>

    <section>
    <div id="post-window">

      <div id="post-window-content">

        <div id="arrow-back">
          <img src="media/chevron-left.svg">
        </div>

        <div class="post-header">
          <img id="detail-profile-pic" class="default-pic-post">
          <div>
            <div id="detail-username" class="post-username"></div>
            <div id="detail-timestamp" class="timestamp"></div>
          </div>
        </div>

        <div id="detail-content" class="box-inside-window"></div>

        <div class="post-actions">
          <button id="detail-like" class="like"> 
            <img src="media/heart.svg"> 
            <span id="like-count">0</span>
          </button>
          <button id="detail-comment" class="comment"> 
            <img src="media/message-circle.svg"> 
            <span id="comment-count">0</span>
          </button>
        </div>

        <div id="comments-section">
          <p class="comments-title">Comments</p>

            <div id="comments-list"></div>

            <div class="add-comment">
                <textarea id="comment-input" placeholder="Write a comment..."></textarea>
                <button id="comment-button">Reply</button>
          </div>
        </div>

      </div>
    </div>

  </section>

  

    <footer>
      
      <nav id="nav-bars">

        <div id="nav-profile"> 
          <img src="media/person.png" class="icon" height="35px">
        </div>

        <div id="nav-home"> 
          <img src="media/home.png" class="icon">
        </div>

        <div id="nav-setting"> 
          <img src="media/setting.png" class="icon">
        </div>

        <div id="nav-search"> 
          <img src="media/search.png" class="icon">
        </div>
        
      </nav>
      

    </footer>

    <script src="js/script.js"></script>

 


</body>
</html>
